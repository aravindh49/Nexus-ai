<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexusAI | Operational Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #fdfcf0;
        --accent-primary: #0d9488; /* Teal */
        --accent-secondary: #d97706; /* Amber */
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-color);
        color: #1e293b;
        overflow-x: hidden;
      }
      .font-mono { font-family: 'JetBrains Mono', monospace; }

      /* Warm Mesh Background */
      .mesh-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: 
          radial-gradient(at 0% 0%, rgba(254, 243, 199, 0.6) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(204, 251, 241, 0.4) 0px, transparent 50%),
          radial-gradient(at 50% 100%, rgba(255, 255, 255, 1) 0px, transparent 50%);
      }

      /* Noise Overlay */
      .noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0.02;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3True%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .cyber-card {
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid rgba(0, 0, 0, 0.08);
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
      }

      .cyber-card:hover {
        border-color: rgba(13, 148, 136, 0.3);
        background: rgba(255, 255, 255, 0.9);
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      }

      .cyber-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }

      .cyber-card:hover::before {
        transform: translateX(100%);
      }

      .scanline {
        width: 100%;
        height: 100px;
        z-index: 10;
        background: linear-gradient(0deg, rgba(255, 255, 255, 0) 0%, rgba(13, 148, 136, 0.01) 50%, rgba(255, 255, 255, 0) 100%);
        opacity: 0.1;
        position: absolute;
        bottom: 100%;
        animation: scanline 10s linear infinite;
        pointer-events: none;
      }

      @keyframes scanline {
        0% { bottom: 100%; }
        100% { bottom: -100px; }
      }

      /* Subtle Ripple for Status Transitions */
      @keyframes status-ripple {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(4); opacity: 0; }
      }
      
      .animate-status-ripple {
        animation: status-ripple 0.6s cubic-bezier(0, 0, 0.2, 1) forwards;
      }

      /* New Status Pop & Glow Animation */
      @keyframes status-pop {
        0% { transform: scale(1); filter: brightness(1); }
        30% { transform: scale(1.3); filter: brightness(1.6); }
        100% { transform: scale(1); filter: brightness(1); }
      }
      
      .animate-status-pop {
        animation: status-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* Specific Completion Success Animations */
      @keyframes success-flash {
        0% { background-color: transparent; }
        50% { background-color: rgba(16, 185, 129, 0.15); }
        100% { background-color: transparent; }
      }
      
      @keyframes success-pulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        50% { transform: scale(1.6); box-shadow: 0 0 15px 5px rgba(16, 185, 129, 0.5); filter: brightness(1.5); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
      }

      .animate-success-flash {
        animation: success-flash 1s ease-out forwards;
      }
      
      .animate-success-pulse {
        animation: success-pulse 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(13, 148, 136, 0.2); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(13, 148, 136, 0.4); }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "uuid": "https://esm.sh/uuid@^13.0.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.575.0",
        "@google/genai": "https://esm.sh/@google/genai@^1.42.0",
        "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
        "jspdf": "https://esm.sh/jspdf@^4.2.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="mesh-bg"></div>
    <div class="noise"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
